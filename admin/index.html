<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1000 Impresiones · Admin</title>
  <link rel="cms-config-url" type="application/x-yaml" href="/admin/config.yml">
</head>
<body>
  <script>
    // After Google OAuth, the callback sets decap-cms-user in localStorage and signals here.
    // We reload so Decap reads decap-cms-user on startup and auto-logs in.
    function reloadForAuth() {
      window.location.reload();
    }

    // BroadcastChannel signal from popup
    if (window.BroadcastChannel) {
      var bc = new BroadcastChannel('decap-oauth');
      bc.onmessage = function(e) {
        if (e.data === 'reload') reloadForAuth();
      };
    }

    // Storage event fallback
    window.addEventListener('storage', function(e) {
      if (e.key === 'decap-cms-oauth-result' && e.newValue) {
        reloadForAuth();
      }
    });
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
