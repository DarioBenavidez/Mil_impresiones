<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1000 Impresiones · Admin</title>
  <link rel="cms-config-url" type="application/x-yaml" href="/admin/config.yml">
</head>
<body>
  <script>
    // Fix: Decap CMS checks e.source === this.popup, but GitHub's COOP header
    // creates a new window proxy after navigation, breaking that strict equality.
    // We intercept window.open and patch message handlers to restore the reference.
    (function() {
      var _origOpen = window.open;
      var _decapPopup = null;

      window.open = function() {
        var popup = _origOpen.apply(this, arguments);
        _decapPopup = popup;
        return popup;
      };

      var _origAddEL = EventTarget.prototype.addEventListener;
      EventTarget.prototype.addEventListener = function(type, handler, options) {
        if (this === window && type === 'message') {
          var wrapped = function(e) {
            if (_decapPopup && e.data && typeof e.data === 'string' && e.data.indexOf('authorization:') === 0) {
              var proxied = new Proxy(e, {
                get: function(target, prop) {
                  if (prop === 'source') return _decapPopup;
                  var val = target[prop];
                  return typeof val === 'function' ? val.bind(target) : val;
                }
              });
              return handler.call(this, proxied);
            }
            return handler.call(this, e);
          };
          return _origAddEL.call(this, type, wrapped, options);
        }
        return _origAddEL.apply(this, arguments);
      };
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
