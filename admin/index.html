<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1000 Impresiones · Admin</title>
  <link rel="cms-config-url" type="application/x-yaml" href="/admin/config.yml">
</head>
<body>
  <script>
    // After the OAuth popup sends the handshake, it redirects to Google.
    // When Google returns to /api/callback, the callback signals here via BroadcastChannel.
    // We relay the success message to Decap (origin check passes, no source check).
    function relayAuthMessage(msg) {
      window.dispatchEvent(new MessageEvent('message', {
        data: msg,
        origin: window.location.origin,
        source: window
      }));
    }

    if (window.BroadcastChannel) {
      var bc = new BroadcastChannel('decap-oauth');
      bc.onmessage = function(e) {
        if (e.data && e.data.indexOf('authorization:github:') === 0) {
          relayAuthMessage(e.data);
        }
      };
    }

    window.addEventListener('storage', function(e) {
      if (e.key === 'decap-cms-oauth-result' && e.newValue) {
        relayAuthMessage(e.newValue);
        localStorage.removeItem('decap-cms-oauth-result');
      }
    });
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
