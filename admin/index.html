<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1000 Impresiones · Admin</title>
  <link rel="cms-config-url" type="application/x-yaml" href="/admin/config.yml">
</head>
<body>
  <script>
    // When the OAuth popup writes to localStorage, relay it to Decap as a message event
    window.addEventListener('storage', function(e) {
      if (e.key === 'decap-cms-oauth-result' && e.newValue) {
        window.dispatchEvent(new MessageEvent('message', {
          data: e.newValue,
          origin: window.location.origin
        }));
        localStorage.removeItem('decap-cms-oauth-result');
      }
    });
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
