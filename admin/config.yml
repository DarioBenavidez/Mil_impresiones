backend:
  name: github
  repo: DarioBenavidez/Mil_impresiones
  branch: main
  base_url: https://www.milimpresiones.com
  auth_endpoint: /api/auth

media_folder: assets/uploads
public_folder: assets/uploads

collections:

  - name: home
    label: "Pagina principal"
    files:

      - name: hero
        label: "Hero Encabezado"
        file: content/home.json
        fields:
          - label: "Eyebrow (texto pequeno arriba del titulo)"
            name: eyebrow
            widget: string
            default: "Diseno - Impresion - Acompanamiento - Desde 2020"
          - label: "Subtitulo"
            name: subtitle
            widget: text
            default: "Sin intermediarios. Cotizacion en menos de 2 horas. Tu pedido listo en 48-72 hs habiles."
          - label: "Texto boton principal"
            name: ctaPrimary
            widget: string
            default: "Pedi tu cotizacion"
          - label: "Badge de envio"
            name: shippingBadge
            widget: string
            default: "Envio a todo el pais"
          - label: "Estadisticas"
            name: stats
            widget: list
            summary: "{{num}} - {{label}}"
            fields:
              - label: "Numero"
                name: num
                widget: string
              - label: "Etiqueta"
                name: label
                widget: string

      - name: proceso
        label: "Proceso - Pasos del flujo"
        file: content/proceso.json
        fields:
          - label: "Pasos"
            name: steps
            widget: list
            summary: "{{num}} - {{title}}"
            fields:
              - label: "Numero"
                name: num
                widget: string
              - label: "Titulo"
                name: title
                widget: string
              - label: "Subtitulo"
                name: sub
                widget: string

      - name: cta_final
        label: "CTA Final - Banda de cierre"
        file: content/cta-final.json
        fields:
          - label: "Eyebrow"
            name: eyebrow
            widget: string
            default: "Empecemos"
          - label: "Titulo"
            name: title
            widget: string
            default: "Tenes un proyecto en mente?"
          - label: "Subtitulo"
            name: subtitle
            widget: text
            default: "Cotizacion en menos de 2 horas. Entrega en 48-72 hs habiles. Sin vueltas."

  - name: servicios_textos
    label: "Servicios - Textos"
    files:
      - name: servicios_home
        label: "Servicios en el Home"
        file: content/servicios-textos.json
        fields:
          - label: "Titulo de seccion"
            name: sectionTitle
            widget: string
            default: "Todo lo que tu marca necesita."
          - label: "Servicios"
            name: items
            widget: list
            summary: "{{num}} - {{name}}"
            fields:
              - label: "Numero"
                name: num
                widget: string
              - label: "Nombre del servicio"
                name: name
                widget: string
              - label: "Tags (subtitulo)"
                name: tag
                widget: string
              - label: "Badge (tiempo de entrega)"
                name: badge
                widget: string

  - name: servicios
    label: "Servicios - Imagenes"
    files:
      - name: imagenes
        label: "Imagenes de servicios"
        file: content/servicios.json
        fields:
          - label: "01 - Impresion digital"
            name: impresion
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "02 - Diseno grafico"
            name: diseno
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "03 - Packaging y etiquetas"
            name: packaging
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "04 - Gigantografias y viniles"
            name: gigantografias
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "05 - Merchandising / Souvenir"
            name: merchandising
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "06 - Offset y tiradas grandes"
            name: offset
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "07 - Papeleria creativa"
            name: papeleria
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false

  - name: trabajos
    label: "Trabajos / Portfolio"
    files:
      - name: portfolio
        label: "Proyectos del portfolio"
        file: content/trabajos.json
        fields:
          - label: "Proyectos"
            name: items
            widget: list
            summary: "{{title}}"
            fields:
              - label: "Titulo del proyecto"
                name: title
                widget: string
              - label: "Meta (ej: Packaging 2025)"
                name: meta
                widget: string
              - label: "Categoria"
                name: cat
                widget: select
                options:
                  - { label: "Packaging", value: "packaging" }
                  - { label: "Diseno grafico", value: "diseno" }
                  - { label: "Papeleria", value: "papeleria" }
                  - { label: "Merchandising/Souvenir", value: "merchandising" }
                  - { label: "Gigantografias", value: "gigantografia" }
                  - { label: "Offset", value: "offset" }
              - label: "Tamano en grilla"
                name: size
                widget: select
                options:
                  - { label: "Pequeno (1/4)", value: "span-3" }
                  - { label: "Mediano (1/3)", value: "span-4" }
                  - { label: "Grande (1/2)", value: "span-6" }
                  - { label: "Grande ancho (1/2)", value: "span-6 wide" }
                  - { label: "Extra grande (2/3)", value: "span-8" }
                  - { label: "Extra grande ancho", value: "span-8 wide" }
              - label: "Imagen del trabajo"
                name: img
                widget: image
                required: false

  - name: testimonios
    label: "Testimonios"
    files:
      - name: testimonios
        label: "Testimonios de clientes"
        file: content/testimonios.json
        fields:
          - label: "Testimonios"
            name: items
            widget: list
            summary: "{{name}}"
            fields:
              - label: "Nombre"
                name: name
                widget: string
              - label: "Rol / Empresa"
                name: role
                widget: string
              - label: "Testimonio"
                name: quote
                widget: text
              - label: "Iniciales"
                name: initials
                widget: string
              - label: "Color de fondo (sin foto)"
                name: color
                widget: select
                options:
                  - { label: "Magenta", value: "m" }
                  - { label: "Cyan", value: "c" }
                  - { label: "Negro", value: "k" }
              - label: "Foto del cliente (opcional)"
                name: avatar
                widget: image
                required: false

  - name: nosotros
    label: "Nosotros"
    files:
      - name: equipo
        label: "Foto del equipo / taller"
        file: content/nosotros.json
        fields:
          - label: "Foto del equipo o taller"
            name: teamPhoto
            widget: image
            required: false

  - name: seo
    label: "SEO"
    files:
      - name: seo_paginas
        label: "Titulos y descripciones"
        file: content/seo.json
        fields:
          - label: "Meta titulo - Home"
            name: titleHome
            widget: string
            default: "1000 Impresiones - Diseno e impresion en Buenos Aires"
          - label: "Meta descripcion - Home"
            name: descHome
            widget: text
            default: "Mas de 500 clientes. Cotizacion en 2 horas. Entrega en 48-72 hs habiles."
          - label: "Meta titulo - Servicios"
            name: titleServicios
            widget: string
            default: "Servicios - 1000 Impresiones"
            required: false
          - label: "Meta descripcion - Servicios"
            name: descServicios
            widget: text
            default: "Impresion digital, diseno grafico, packaging, gigantografias y mas."
            required: false
          - label: "Meta titulo - Trabajos"
            name: titleTrabajos
            widget: string
            default: "Trabajos - 1000 Impresiones"
            required: false
          - label: "Meta titulo - Nosotros"
            name: titleNosotros
            widget: string
            default: "Nosotros - 1000 Impresiones"
            required: false
          - label: "Meta titulo - Contacto"
            name: titleContacto
            widget: string
            default: "Contacto - 1000 Impresiones"
            required: false

  - name: diseno
    label: "Diseno Visual"
    files:
      - name: visual
        label: "Colores, Logo y Tipografia"
        file: content/config-visual.json
        fields:
          - label: "Logo (modo claro)"
            name: logoLight
            widget: image
            required: false
            hint: "Logo que se muestra en el encabezado. PNG o SVG con fondo transparente."
          - label: "Logo (modo oscuro)"
            name: logoDark
            widget: image
            required: false
          - label: "Color de acento principal"
            name: accentColor
            widget: color
            default: "#EC008C"
          - label: "Color cyan (barra CMYK)"
            name: cyanColor
            widget: color
            default: "#00AEEF"
          - label: "Color amarillo (barra CMYK)"
            name: yellowColor
            widget: color
            default: "#FFE500"
          - label: "Color de fondo general"
            name: paperColor
            widget: color
            default: "#F4F1EA"
          - label: "Color de texto"
            name: inkColor
            widget: color
            default: "#1a1815"
          - label: "Tipografia de titulos"
            name: fontDisplay
            widget: select
            default: "Space Grotesk"
            options:
              - { label: "Space Grotesk (actual)", value: "Space Grotesk" }
              - { label: "Fraunces (serif elegante)", value: "Fraunces" }
              - { label: "Bricolage Grotesque (moderna)", value: "Bricolage Grotesque" }
              - { label: "Archivo (bold industrial)", value: "Archivo" }
          - label: "Tipografia de cuerpo"
            name: fontBody
            widget: select
            default: "DM Sans"
            options:
              - { label: "DM Sans (actual)", value: "DM Sans" }
              - { label: "Inter (tech limpia)", value: "Inter" }
              - { label: "IBM Plex Sans (formal)", value: "IBM Plex Sans" }
          - label: "Ancho maximo del contenido (px)"
            name: containerWidth
            widget: number
            default: 1240
            value_type: int
            min: 900
            max: 1600
          - label: "Redondez de bordes (px)"
            name: radiusBase
            widget: number
            default: 18
            value_type: int
            min: 0
            max: 40
