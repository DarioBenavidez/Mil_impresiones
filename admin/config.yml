backend:
  name: github
  repo: DarioBenavidez/Mil_impresiones
  branch: main
  base_url: https://www.milimpresiones.com
  auth_endpoint: /api/auth

media_folder: assets/uploads
public_folder: assets/uploads

locale: es

collections:

  - name: trabajos
    label: "Trabajos / Portfolio"
    files:
      - name: portfolio
        label: "Proyectos del portfolio"
        file: content/trabajos.json
        fields:
          - label: "Proyectos"
            name: items
            widget: list
            summary: "{{title}}"
            fields:
              - label: "Titulo del proyecto"
                name: title
                widget: string
              - label: "Meta (ej: Packaging 2025)"
                name: meta
                widget: string
              - label: "Categoria"
                name: cat
                widget: select
                options:
                  - { label: "Packaging", value: "packaging" }
                  - { label: "Diseno grafico", value: "diseno" }
                  - { label: "Papeleria", value: "papeleria" }
                  - { label: "Merchandising/Souvenir", value: "merchandising" }
                  - { label: "Gigantografias", value: "gigantografia" }
                  - { label: "Offset", value: "offset" }
              - label: "Tamano en grilla"
                name: size
                widget: select
                options:
                  - { label: "Pequeno (1/4)", value: "span-3" }
                  - { label: "Mediano (1/3)", value: "span-4" }
                  - { label: "Grande (1/2)", value: "span-6" }
                  - { label: "Grande ancho (1/2)", value: "span-6 wide" }
                  - { label: "Extra grande (2/3)", value: "span-8" }
                  - { label: "Extra grande ancho", value: "span-8 wide" }
              - label: "Imagen del trabajo"
                name: img
                widget: image
                required: false

  - name: servicios
    label: "Servicios"
    files:
      - name: imagenes
        label: "Imagenes de servicios"
        file: content/servicios.json
        fields:
          - label: "01 - Impresion digital"
            name: impresion
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "02 - Diseno grafico"
            name: diseno
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "03 - Packaging y etiquetas"
            name: packaging
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "04 - Gigantografias y viniles"
            name: gigantografias
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "05 - Merchandising / Souvenir"
            name: merchandising
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "06 - Offset y tiradas grandes"
            name: offset
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false
          - label: "07 - Papeleria creativa"
            name: papeleria
            widget: object
            fields:
              - label: "Imagen"
                name: img
                widget: image
                required: false

  - name: testimonios
    label: "Testimonios"
    files:
      - name: testimonios
        label: "Testimonios de clientes"
        file: content/testimonios.json
        fields:
          - label: "Testimonios"
            name: items
            widget: list
            summary: "{{name}}"
            fields:
              - label: "Nombre"
                name: name
                widget: string
              - label: "Rol / Empresa"
                name: role
                widget: string
              - label: "Testimonio"
                name: quote
                widget: text
              - label: "Iniciales"
                name: initials
                widget: string
              - label: "Color de fondo (sin foto)"
                name: color
                widget: select
                options:
                  - { label: "Magenta", value: "m" }
                  - { label: "Cyan", value: "c" }
                  - { label: "Negro", value: "k" }
              - label: "Foto del cliente (opcional)"
                name: avatar
                widget: image
                required: false

  - name: nosotros
    label: "Nosotros"
    files:
      - name: equipo
        label: "Foto del equipo / taller"
        file: content/nosotros.json
        fields:
          - label: "Foto del equipo o taller"
            name: teamPhoto
            widget: image
            required: false
