<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trabajos · 1000 Impresiones</title>
<link rel="icon" href="assets/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Bricolage+Grotesque:wght@400;500;600&family=Archivo:wght@400;500;600&family=Jost:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="trabajos">

<main>
  <section class="page-hero">
    <div class="container">
      <div class="cmyk-bar reveal" style="max-width:120px"><span class="c"></span><span class="m"></span><span class="y"></span><span class="k"></span></div>
      <span class="eyebrow reveal">Portfolio</span>
      <h1 class="reveal reveal-delay-1" style="margin-top: var(--s4)">Proyectos que salieron de casa.</h1>
      <p class="reveal reveal-delay-2">Cada pieza acá abajo pasó por diseño, impresión y control de calidad en nuestro equipo. Sin intermediarios.</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="filter-bar reveal" id="filters">
        <button class="filter-chip active" data-filter="all">Todos</button>
        <button class="filter-chip" data-filter="packaging">Packaging</button>
        <button class="filter-chip" data-filter="diseno">Diseño gráfico</button>
        <button class="filter-chip" data-filter="papeleria">Papelería</button>
        <button class="filter-chip" data-filter="gigantografia">Gigantografías</button>
        <button class="filter-chip" data-filter="merchandising">Merchandising / Souvenir</button>
        <button class="filter-chip" data-filter="offset">Offset</button>
      </div>

      <div class="works-grid" id="worksGrid"></div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="cta-band reveal">
        <div class="bg-dot c"></div>
        <div class="bg-dot m"></div>
        <h2>¿Querés ver tu proyecto acá?</h2>
        <p class="cta-sub">Contanos qué tenés en mente y lo hacemos realidad.</p>
        <div class="hero-ctas">
          <a href="contacto.html" class="btn btn-primary">Pedí tu cotización
            <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="chrome.js?v=2"></script>
<script>
const WORKS = [
  { cat: 'packaging',    title: 'Cervecería Artesanal Norte', meta: 'Packaging · 2025',               bg: 'bg-m',     size: 'span-6 wide', glyph: 'CN', img: 'https://loremflickr.com/800/600/beer,packaging,bottle?lock=101' },
  { cat: 'diseno',       title: 'Estudio Almendra',           meta: 'Identidad · 2025',               bg: 'bg-k',     size: 'span-3',      glyph: 'AM', img: 'https://loremflickr.com/800/600/branding,logo,identity?lock=102' },
  { cat: 'papeleria',    title: 'Clínica Sonrisas',           meta: 'Papelería · 2024',               bg: 'bg-y',     size: 'span-3',      glyph: 'CS', img: 'https://loremflickr.com/800/600/stationery,card,paper?lock=103' },
  { cat: 'merchandising',title: 'Agencia Deportiva Sur',      meta: 'Merchandising / Souvenir · 2024',bg: 'bg-c',     size: 'span-4',      glyph: '01', img: 'https://loremflickr.com/800/600/merchandise,sport,tshirt?lock=104' },
  { cat: 'diseno',       title: 'Restó Ñ',                    meta: 'Carta editorial · 2024',         bg: 'bg-paper', size: 'span-4',      glyph: 'Ñ',  img: 'https://loremflickr.com/800/600/menu,restaurant,design?lock=105' },
  { cat: 'gigantografia',title: 'Feria Emprendedora',         meta: 'Gigantografías · 2024',          bg: 'bg-m',     size: 'span-4',      glyph: 'FE', img: 'https://loremflickr.com/800/600/banner,fair,event?lock=106' },
  { cat: 'packaging',    title: 'Miel del Monte',             meta: 'Etiquetas · 2024',               bg: 'bg-y',     size: 'span-4',      glyph: 'M',  img: 'https://loremflickr.com/800/600/honey,jar,label?lock=107' },
  { cat: 'offset',       title: 'Grupo Textil Sur · Catálogo',meta: 'Offset · 2024',                  bg: 'bg-k',     size: 'span-8 wide', glyph: 'TS', img: 'https://loremflickr.com/800/600/catalog,printing,magazine?lock=108' },
  { cat: 'papeleria',    title: 'Boda Soler-Navarro',         meta: 'Invitaciones · 2024',            bg: 'bg-c',     size: 'span-4',      glyph: 'SN', img: 'https://loremflickr.com/800/600/wedding,invitation,card?lock=109' },
  { cat: 'merchandising',title: 'Kit bienvenida Koalinga',    meta: 'Merchandising / Souvenir · 2023',bg: 'bg-m',     size: 'span-4',      glyph: 'KO', img: 'https://loremflickr.com/800/600/welcome,kit,gift?lock=110' },
  { cat: 'diseno',       title: 'Escuela Arrayanes',          meta: 'Identidad · 2023',               bg: 'bg-y',     size: 'span-4',      glyph: 'EA', img: 'https://loremflickr.com/800/600/school,brand,identity?lock=111' },
  { cat: 'gigantografia',title: 'Vinilado de local Arena',    meta: 'Viniles · 2023',                 bg: 'bg-c',     size: 'span-6',      glyph: 'AR', img: 'https://loremflickr.com/800/600/vinyl,storefront,signage?lock=112' },
  { cat: 'packaging',    title: 'Té de las Sierras',          meta: 'Packaging · 2023',               bg: 'bg-paper', size: 'span-6',      glyph: 'TS', img: 'https://loremflickr.com/800/600/tea,packaging,box?lock=113' },
];

const getGlyphBgSVG = (bg) => {
  const sw = bg === 'bg-y' || bg === 'bg-paper' ? '#111' : '#fff';
  return `<svg width="55%" height="55%" viewBox="0 0 100 100" fill="none" opacity="0.2" style="position:absolute; top:10%; left:10%"><circle cx="30" cy="30" r="22" stroke="${sw}" stroke-width="1.5"/><circle cx="60" cy="55" r="22" stroke="${sw}" stroke-width="1.5"/></svg>`;
};

const grid = document.getElementById('worksGrid');
function render(filter) {
  const items = filter === 'all' ? WORKS : WORKS.filter(w => w.cat === filter);
  grid.innerHTML = items.map((w, i) => `
    <div class="work-card ${w.size} reveal" data-cat="${w.cat}" style="transition-delay:${(i%4)*0.08}s">
      <div class="work-thumb ${w.bg}">
        ${w.img ? `<img src="${w.img}" alt="${w.title}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" loading="lazy">` : getGlyphBgSVG(w.bg) + `<span style="position:relative">${w.glyph}</span>`}
      </div>
      <div class="work-overlay">
        <div>
          <div class="work-meta">${w.meta}</div>
          <div class="work-title">${w.title}</div>
        </div>
      </div>
    </div>
  `).join('');
  if (window.__reObserveReveal) window.__reObserveReveal();
}
let activeFilter = 'all';
render('all');

document.querySelectorAll('#filters .filter-chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#filters .filter-chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    activeFilter = c.dataset.filter;
    render(activeFilter);
  });
});

// Carga imágenes desde el CMS (content/trabajos.json)
fetch('content/trabajos.json').then(r => r.json()).then(data => {
  if (!data.items) return;
  data.items.forEach((item, i) => {
    if (item.img && WORKS[i]) WORKS[i].img = item.img;
  });
  render(activeFilter);
}).catch(() => {});
</script>
</body>
</html>
