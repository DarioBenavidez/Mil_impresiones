<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trabajos · 1000 Impresiones</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="icon" href="assets/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="assets/favicon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,ital,wght@9..144,1,400;9..144,1,600&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="/image-adaptive.css">
</head>
<body data-page="trabajos">

<main>
  <section class="page-hero">
    <div class="container">
      <div class="cmyk-bar reveal" style="max-width:120px"><span class="c"></span><span class="m"></span><span class="y"></span><span class="k"></span></div>
      <span class="eyebrow ink-dot reveal">Portfolio</span>
      <h1 class="reveal reveal-delay-1" style="margin-top: var(--s4)">Proyectos que salieron de casa.</h1>
      <p class="reveal reveal-delay-2">Cada pieza acá abajo pasó por diseño, impresión y control de calidad en nuestro equipo. Sin intermediarios.</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="filter-bar reveal" id="filters">
        <button class="filter-chip active" data-filter="all">Todos</button>
        <button class="filter-chip" data-filter="packaging">Packaging</button>
        <button class="filter-chip" data-filter="diseno">Diseño gráfico</button>
        <button class="filter-chip" data-filter="papeleria">Papelería</button>
        <button class="filter-chip" data-filter="gigantografia">Gigantografías</button>
        <button class="filter-chip" data-filter="merchandising">Merchandising / Souvenir</button>
        <button class="filter-chip" data-filter="offset">Offset</button>
      </div>

      <div class="works-grid" id="worksGrid"></div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="cta-band reveal">
        <div class="bg-dot c"></div>
        <div class="bg-dot m"></div>
        <h2>¿Querés ver tu proyecto acá?</h2>
        <p class="cta-sub">Contanos qué tenés en mente y lo hacemos realidad.</p>
        <div class="hero-ctas">
          <a href="contacto.html" class="btn btn-primary">Pedí tu cotización
            <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="chrome.js?v=2"></script>
<script>
(function(){
  var current='all';
  var allItems=[];
  var ph=['bg-m','bg-k','bg-y','bg-c','bg-paper'];

  function renderGrid(items){
    var grid=document.getElementById('worksGrid');
    if(!grid)return;
    var filtered=current==='all'?items:items.filter(function(i){return i.cat===current;});
    if(!filtered.length){
      grid.innerHTML='<p style="color:var(--fg-3);padding:2rem 0;grid-column:1/-1;font-size:14px">No hay trabajos en esta categoría aún.</p>';
      return;
    }
    grid.innerHTML=filtered.map(function(item,i){
      var sz=item.size||'span-4';
      var imgHTML=item.img
        ?'<img src="'+item.img+'" alt="'+item.title+'" style="width:100%;height:auto;display:block;">'
        :'<div class="'+ph[i%ph.length]+'" style="height:280px;width:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;opacity:0.5">Sin imagen</div>';
      // NO usamos clase 'reveal' para items dinámicos — ya son visibles al generarse
      return '<div class="work-card '+sz+' is-visible" style="opacity:1;transform:none"><div class="work-thumb">'+imgHTML+'</div><div class="work-overlay-v3"><div class="work-meta">'+item.meta+'</div><div class="work-title">'+item.title+'</div></div></div>';
    }).join('');
  }

  document.querySelectorAll('.filter-chip').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      current=btn.dataset.filter;
      renderGrid(allItems);
    });
  });

  fetch('content/trabajos.json')
    .then(function(r){return r.json();})
    .catch(function(){return{};})
    .then(function(data){
      allItems=(data.items||[]).filter(function(i){return i.title;});
      renderGrid(allItems);
    });
})();
</script>
