<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tienda · 1000 Impresiones</title>
<link rel="icon" href="/assets/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,ital,wght@9..144,1,400&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
/* ── SHOP PAGE ── */
.shop-page { padding: var(--shop-page-pt, 48px) 0 var(--shop-page-pb, 128px); }

/* Hero: solo imagen */
.shop-hero {
  width: 100%;
  height: 29vw;
  min-height: 180px;
  max-height: 600px;
  overflow: hidden;
  display: block;
  line-height: 0;
}
.shop-hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}
@media(max-width:600px) { .shop-hero { height: 48vw; min-height: unset; max-height: none; } }

/* Filter strip */
.filter-strip {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0; /* below nav = handled by JS */
  z-index: 30;
  padding: var(--s3) 0;
}
.filter-strip-inner {
  display: flex;
  gap: var(--s2);
  align-items: center;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 2px;
}
.filter-strip-inner::-webkit-scrollbar { display: none; }
.fchip {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--fg-2);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.fchip:hover { border-color: var(--fg); color: var(--fg); }
.fchip.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.fchip-dot { width: 7px; height: 7px; border-radius: 50%; }

/* Sort + count bar */
.shop-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--s5);
  flex-wrap: wrap;
  gap: var(--s3);
  padding-top: var(--shop-bar-pt, 32px);
}
.shop-bar-count { font-size: 14px; color: var(--fg-3); }
.sort-select {
  font-family: var(--font-display);
  font-size: 13px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 999px;
  background: var(--bg);
  color: var(--fg);
  cursor: pointer;
}
.sort-select:focus { outline: none; border-color: var(--m); }

/* Products grid */
.shop-grid {
  display: grid;
  grid-template-columns: repeat(var(--shop-cols, 4), 1fr);
  gap: var(--shop-grid-gap, 16px);
}
@media(max-width:1100px) { .shop-grid { grid-template-columns: repeat(3, 1fr) !important; } }
@media(max-width:760px)  { .shop-grid { grid-template-columns: 1fr 1fr !important; } }
@media(max-width:480px)  { .shop-grid { grid-template-columns: 1fr !important; } }

/* Product card v2 */
.pcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .3s cubic-bezier(.2,.9,.3,1), box-shadow .3s;
  position: relative;
  text-decoration: none;
  color: inherit;
}
.pcard:hover { transform: translateY(-4px); box-shadow: 0 20px 48px -16px rgba(0,0,0,.14); }

.pcard-thumb {
  height: var(--shop-thumb-h, 200px);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pcard-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .5s cubic-bezier(.2,.9,.3,1);
}
.pcard:hover .pcard-thumb img { transform: scale(1.05); }
.pcard-thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 48px; font-weight: 700;
  opacity: .18; letter-spacing: -.04em;
  color: #fff;
}
.pcard.m-card .pcard-thumb { background: linear-gradient(135deg,#EC008C,#BB006F); }
.pcard.c-card .pcard-thumb { background: linear-gradient(135deg,#00AEEF,#0088CC); }
.pcard.y-card .pcard-thumb { background: linear-gradient(135deg,#F5D800,#D4B800); }
.pcard.k-card .pcard-thumb { background: linear-gradient(135deg,#333,#111); }

.pcard-badge {
  position: absolute; top: 10px; left: 10px;
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 999px;
}
.badge-hot { background: var(--m); color: #fff; }
.badge-fast { background: var(--c); color: #fff; }
.badge-new { background: var(--y); color: var(--k); }

.pcard-body { padding: var(--s4); display: flex; flex-direction: column; gap: var(--s2); flex: 1; }
.pcard-cat {
  font-family: var(--font-display); font-size: 10px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase; color: var(--fg-3);
}
.pcard-name {
  font-family: var(--font-display); font-size: 16px; font-weight: 700;
  letter-spacing: -.02em; color: var(--fg); line-height: 1.15;
}
.pcard-desc { font-size: 12px; color: var(--fg-2); line-height: 1.4; flex: 1; }
.pcard-specs {
  display: flex; gap: 5px; flex-wrap: wrap; margin-top: auto;
}
.pcard-spec {
  font-family: var(--font-display); font-size: 10px;
  padding: 3px 7px; border-radius: 4px;
  background: var(--bg-2); color: var(--fg-3); border: 1px solid var(--border);
}
.pcard-price-row {
  display: flex; align-items: baseline; gap: var(--s2);
  padding-top: var(--s3); border-top: 1px solid var(--border);
}
.pcard-from { font-size: 11px; color: var(--fg-3); }
.pcard-price { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--fg); letter-spacing: -.03em; }
.pcard-unit { font-size: 11px; color: var(--fg-3); }
.pcard-delivery { font-family: var(--font-display); font-size: 11px; color: var(--fg-3); margin-top: 3px; }

.pcard-actions {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: var(--s2);
  margin-top: var(--s3);
}
.pcard-btn-cart {
  font-family: var(--font-display); font-size: 13px; font-weight: 600;
  padding: 10px 12px; border-radius: var(--radius-sm);
  background: var(--m); color: #fff; border: none; cursor: pointer;
  transition: background .2s, transform .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  text-decoration: none;
}
.pcard-btn-cart:hover { background: #c4007a; transform: translateY(-1px); }
.pcard.c-card .pcard-btn-cart { background: var(--c); }
.pcard.c-card .pcard-btn-cart:hover { background: #0093cc; }
.pcard.y-card .pcard-btn-cart { background: var(--k); color: var(--bg); }
.pcard.k-card .pcard-btn-cart { background: var(--c); }

.pcard-btn-detail {
  font-family: var(--font-display); font-size: 12px; font-weight: 500;
  padding: 10px 12px; border-radius: var(--radius-sm);
  background: transparent; color: var(--fg-2);
  border: 1.5px solid var(--border); cursor: pointer;
  transition: border-color .2s, color .2s;
  text-decoration: none;
  display: flex; align-items: center; justify-content: center;
  white-space: nowrap;
}
.pcard-btn-detail:hover { border-color: var(--fg); color: var(--fg); }

/* Empty state */
.shop-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: var(--s10) var(--s5);
  color: var(--fg-3);
  font-size: 15px;
}
.shop-empty a { color: var(--m); font-weight: 600; text-decoration: none; }
</style>
</head>
<body data-page="shop">
<main>

  <section class="shop-hero" id="shopHero">
    <img src="/assets/uploads/banner-bc.png" id="shopHeroImg" alt="Mil Impresiones" class="shop-hero-img">
  </section>
  <script>
  fetch('/api/content?file=config-visual.json').then(function(r){return r.json();}).catch(function(){return{};}).then(function(cfg){
    var s = document.getElementById('shopHero');
    var i = document.getElementById('shopHeroImg');
    if(cfg.bannerShopHeight && window.innerWidth > 600) s.style.height = Math.round(parseInt(cfg.bannerShopHeight)/14.4) + 'vw';
    if(cfg.bannerShopPosition) i.style.objectPosition = cfg.bannerShopPosition;
    if(cfg.shopCols) document.documentElement.style.setProperty('--shop-cols', cfg.shopCols);
    if(cfg.shopThumbH) document.documentElement.style.setProperty('--shop-thumb-h', cfg.shopThumbH + 'px');
    if(cfg.shopBgColor) document.querySelector('.shop-page').style.background = cfg.shopBgColor;
    if(cfg.shopPagePt != null) document.documentElement.style.setProperty('--shop-page-pt', cfg.shopPagePt + 'px');
    if(cfg.shopBarPt  != null) document.documentElement.style.setProperty('--shop-bar-pt',  cfg.shopBarPt  + 'px');
    if(cfg.shopGridGap!= null) document.documentElement.style.setProperty('--shop-grid-gap', cfg.shopGridGap + 'px');
  });
  </script>

  <!-- Filter strip -->
  <div class="filter-strip" id="filterStrip">
    <div class="container">
      <div class="filter-strip-inner" id="filterChips">
        <button class="fchip active" data-cat="all">Todos</button>
        <button class="fchip" data-cat="impresion">
          <span class="fchip-dot" style="background:var(--c)"></span>Impresión
        </button>
        <button class="fchip" data-cat="packaging">
          <span class="fchip-dot" style="background:var(--y)"></span>Packaging
        </button>
        <button class="fchip" data-cat="giganto">
          <span class="fchip-dot" style="background:var(--k)"></span>Gigantografías
        </button>
        <button class="fchip" data-cat="diseno">
          <span class="fchip-dot" style="background:var(--m)"></span>Diseño
        </button>
        <button class="fchip" data-cat="merch">
          <span class="fchip-dot" style="background:#888"></span>Merchandising
        </button>
        <button class="fchip" data-cat="papeleria">
          <span class="fchip-dot" style="background:#a855f7"></span>Papelería
        </button>
      </div>
    </div>
  </div>

  <!-- Products -->
  <div class="shop-page">
    <div class="container">
      <div class="shop-bar">
        <span class="shop-bar-count" id="shopCount">Cargando...</span>
        <select class="sort-select" id="sortSelect">
          <option value="default">Ordenar: relevancia</option>
          <option value="price-asc">Precio: menor a mayor</option>
          <option value="price-desc">Precio: mayor a menor</option>
        </select>
      </div>
      <div class="shop-grid" id="shopGrid">
        <!-- skeletons -->
        <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
      </div>
    </div>
  </div>

</main>

<script src="/chrome.js?v=5"></script>
<script>
(function () {
  var allProducts = [];
  var activeCat = 'all';
  var searchQ = '';
  var grid = document.getElementById('shopGrid');
  var countEl = document.getElementById('shopCount');

  // Params
  var params = new URLSearchParams(location.search);
  if (params.get('cat')) {
    activeCat = params.get('cat');
    document.querySelectorAll('#filterChips .fchip').forEach(function(c) {
      c.classList.toggle('active', c.dataset.cat === activeCat);
    });
  }

  // Filters
  document.querySelectorAll('#filterChips .fchip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      activeCat = chip.dataset.cat;
      document.querySelectorAll('#filterChips .fchip').forEach(function(c) { c.classList.remove('active'); });
      chip.classList.add('active');
      var url = activeCat === 'all' ? '/shop' : '/shop?cat=' + activeCat;
      history.replaceState(null, '', url);
      render();
    });
  });

  // Search
  // (búsqueda disponible desde la navbar)

  // Sort
  document.getElementById('sortSelect').addEventListener('change', function() { render(); });

  function getFiltered() {
    var list = allProducts.filter(function(p) { return !p.hidden; });
    if (activeCat !== 'all') list = list.filter(function(p) { return p.cat === activeCat; });
    if (searchQ) {
      list = list.filter(function(p) {
        return (p.name || '').toLowerCase().includes(searchQ)
          || (p.desc || '').toLowerCase().includes(searchQ)
          || (p.category || '').toLowerCase().includes(searchQ);
      });
    }
    var sort = document.getElementById('sortSelect').value;
    if (sort === 'price-asc') list = list.slice().sort(function(a,b) { return a.price - b.price; });
    if (sort === 'price-desc') list = list.slice().sort(function(a,b) { return b.price - a.price; });
    return list;
  }

  function render() {
    var products = getFiltered();
    countEl.textContent = products.length + ' producto' + (products.length !== 1 ? 's' : '');
    if (!products.length) {
      grid.innerHTML = '<div class="shop-empty">No encontramos productos para esa búsqueda.<br>Escribinos por <a href="https://wa.me/5491136365889">WhatsApp</a> y te cotizamos.</div>';
      return;
    }
    grid.innerHTML = products.map(function(p) {
      var waMsg = encodeURIComponent('Hola! Me interesa "' + p.name + '". ¿Pueden cotizarme?');
      var thumbHtml = p.img
        ? '<img src="' + p.img + '" alt="' + p.name + '" loading="lazy">'
        : '<div class="pcard-thumb-placeholder">' + (p.icon || '📦') + '</div>';
      return '<div class="pcard ' + (p.color || 'm') + '-card">'
        + '<div class="pcard-thumb">'
        + (p.badge ? '<span class="pcard-badge badge-' + (p.badgeType || 'hot') + '">' + p.badge + '</span>' : '')
        + thumbHtml
        + '</div>'
        + '<div class="pcard-body">'
        + '<span class="pcard-cat">' + (p.category || '') + '</span>'
        + '<span class="pcard-name">' + p.name + '</span>'
        + '<p class="pcard-desc">' + (p.desc || '').slice(0, 80) + (p.desc && p.desc.length > 80 ? '…' : '') + '</p>'
        + '<div class="pcard-specs">' + (p.specs || []).slice(0, 3).map(function(s) { return '<span class="pcard-spec">' + s + '</span>'; }).join('') + '</div>'
        + '<div class="pcard-price-row"><span class="pcard-from">Desde</span><span class="pcard-price">$' + (p.price || 0).toLocaleString('es-AR') + '</span><span class="pcard-unit">' + (p.unit || '') + '</span></div>'
        + '<div class="pcard-delivery">⏱ ' + (p.delivery || 'Consultar') + '</div>'
        + '<div class="pcard-actions">'
        + '<button class="pcard-btn-cart" data-product=\'' + JSON.stringify({id:p.id||p.name,name:p.name,price:p.price,unit:p.unit,color:p.color||'m',icon:p.icon||'📦'}).replace(/'/g,"&#39;") + '\'>🛒 Agregar</button>'
        + '<a href="/shop/producto?id=' + encodeURIComponent(p.id || p.name) + '" class="pcard-btn-detail">Ver →</a>'
        + '</div>'
        + '</div></div>';
    }).join('');

    // Bind add to cart buttons
    grid.querySelectorAll('.pcard-btn-cart').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        try {
          var prod = JSON.parse(btn.dataset.product);
          Cart.add(prod);
        } catch(_) {}
      });
    });
  }

  // Load
  fetch('/content/productos.json')
    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
    .catch(function() { return null; })
    .then(function(d) {
      allProducts = d && d.products ? d.products : [];
      render();
    });

  // Sticky filter strip offset (below sticky nav)
  var strip = document.getElementById('filterStrip');
  var nav = document.getElementById('nav');
  function updateSticky() {
    if (nav) strip.style.top = nav.offsetHeight + 'px';
  }
  updateSticky();
  window.addEventListener('resize', updateSticky);
})();
</script>
</body>
</html>
