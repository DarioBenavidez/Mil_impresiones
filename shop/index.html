<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tienda · Mil Impresiones · Productos de impresión en Buenos Aires</title>
<meta name="description" content="Explorá nuestro catálogo: tarjetas personales, volantes, gigantografías, packaging, merchandising y más. Precios con IVA incluido · Entrega en Buenos Aires.">
<link rel="canonical" href="https://milimpresiones.com/shop/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://milimpresiones.com/shop/">
<meta property="og:title" content="Tienda · Mil Impresiones">
<meta property="og:description" content="Catálogo completo de impresión digital. Tarjetas, volantes, packaging y más. Entrega en 48-72 hs.">
<meta property="og:image" content="https://milimpresiones.com/assets/uploads/banner-home.png">
<meta property="og:locale" content="es_AR">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/assets/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,ital,wght@9..144,1,400&family=Jost:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,ital,wght@9..144,1,400&family=Jost:wght@400;500;600;700&display=swap"></noscript>
<link rel="stylesheet" href="/styles.css">
<script src="/chrome.js?v=7" defer></script>
<style>
/* ── SHOP PAGE ── */
.shop-page { padding: var(--shop-page-pt, 48px) 0 var(--shop-page-pb, 128px); }

/* Filter strip */
.filter-strip {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0; /* below nav = handled by JS */
  z-index: 30;
  padding: var(--s3) 0;
}
.filter-strip-inner {
  display: flex;
  gap: var(--s2);
  align-items: center;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 2px;
}
.filter-strip-inner::-webkit-scrollbar { display: none; }
.fchip {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--fg-2);
  cursor: pointer;
  transition: background .2s, border-color .2s, color .2s;
  white-space: nowrap;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.fchip:hover { border-color: var(--fg); color: var(--fg); }
.fchip.active { background: var(--fg); border-color: var(--fg); color: var(--bg); }
.fchip-dot { width: 7px; height: 7px; border-radius: 50%; }

/* Sort + count bar */
.shop-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--s5);
  flex-wrap: wrap;
  gap: var(--s3);
  padding-top: var(--shop-bar-pt, 32px);
}
.shop-bar-count { font-size: 14px; color: var(--fg-3); }
.sort-select {
  font-family: var(--font-display);
  font-size: 13px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 999px;
  background: var(--bg);
  color: var(--fg);
  cursor: pointer;
}
.sort-select:focus { outline: none; border-color: var(--m); }

/* Products grid */
.shop-grid {
  display: grid;
  grid-template-columns: repeat(var(--shop-cols, 4), 1fr);
  gap: var(--shop-grid-gap, 16px);
}
@media(max-width:1100px) { .shop-grid { grid-template-columns: repeat(3, 1fr) !important; } }
@media(max-width:760px)  { .shop-grid { grid-template-columns: 1fr 1fr !important; } }
@media(max-width:480px)  { .shop-grid { grid-template-columns: 1fr !important; } }

/* Product card v2 */
.pcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .3s cubic-bezier(.2,.9,.3,1), box-shadow .3s;
  position: relative;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 16px 36px -10px rgba(0,0,0,.30);
}
.pcard:hover { transform: translateY(-4px); box-shadow: 0 26px 56px -14px rgba(0,0,0,.34); }

.pcard-thumb {
  aspect-ratio: 3/2;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: inherit;
}
.pcard-desc, .pcard-specs { display: none !important; }
.pcard-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .5s cubic-bezier(.2,.9,.3,1);
}
.pcard:hover .pcard-thumb img { transform: scale(1.05); }
.pcard-thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 48px; font-weight: 700;
  opacity: .4; letter-spacing: -.04em;
  color: var(--fg-3);
}
.pcard-thumb { background: var(--bg-2); }

.pcard-badge {
  position: absolute; top: 10px; left: 10px;
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 999px;
}
.badge-hot { background: var(--m); color: #fff; }
.badge-fast { background: var(--c); color: #fff; }
.badge-new { background: var(--y); color: var(--k); }

.pcard-body { padding: var(--s4); display: flex; flex-direction: column; gap: var(--s2); flex: 1; }
.pcard-cat {
  font-family: var(--font-display); font-size: 10px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase; color: var(--fg-3);
}
.pcard-name {
  font-family: var(--font-display); font-size: 16px; font-weight: 700;
  letter-spacing: -.02em; color: var(--fg); line-height: 1.15;
}
.pcard-desc { font-size: 12px; color: var(--fg-2); line-height: 1.4; flex: 1; }
.pcard-specs {
  display: flex; gap: 5px; flex-wrap: wrap; margin-top: auto;
}
.pcard-spec {
  font-family: var(--font-display); font-size: 10px;
  padding: 3px 9px; border-radius: 999px;
  background: var(--bg-2); color: var(--fg-3); border: 1px solid var(--border);
}
.pcard-price-row {
  display: flex; align-items: baseline; gap: var(--s2);
  padding-top: var(--s3); border-top: 1px solid var(--border);
}
.pcard-from { font-size: 11px; color: var(--fg-3); }
.pcard-price { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--fg); letter-spacing: -.03em; }
.pcard-unit { font-size: 11px; color: var(--fg-3); }
.pcard-delivery { font-family: var(--font-display); font-size: 11px; color: var(--fg-3); margin-top: 3px; }

.pcard-actions {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: var(--s2);
  margin-top: var(--s3);
}
.pcard-btn-cart {
  font-family: var(--font-display); font-size: 13px; font-weight: 600;
  padding: 10px 12px; border-radius: var(--radius-sm);
  background: var(--m); color: #fff; border: none; cursor: pointer;
  transition: background .2s, transform .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  text-decoration: none;
}
.pcard-btn-cart:hover { background: color-mix(in srgb, var(--m) 85%, #000); transform: translateY(-1px); }

.pcard-btn-detail {
  font-family: var(--font-display); font-size: 12px; font-weight: 500;
  padding: 10px 12px; border-radius: var(--radius-sm);
  background: transparent; color: var(--fg-2);
  border: 1.5px solid var(--border); cursor: pointer;
  transition: border-color .2s, color .2s;
  text-decoration: none;
  display: flex; align-items: center; justify-content: center;
  white-space: nowrap;
}
.pcard-btn-detail:hover { border-color: var(--fg); color: var(--fg); }

/* Empty state */
.shop-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: var(--s10) var(--s5);
  color: var(--fg-3);
  font-size: 15px;
}
.shop-empty a { color: var(--m); font-weight: 600; text-decoration: none; }
</style>
</head>
<body data-page="shop">
<main>

  <script>
  fetch('/api/content?file=config-visual.json').then(function(r){return r.json();}).catch(function(){return{};}).then(function(cfg){
    if(cfg.shopCols) document.documentElement.style.setProperty('--shop-cols', cfg.shopCols);
    if(cfg.shopThumbH) document.documentElement.style.setProperty('--shop-thumb-h', cfg.shopThumbH + 'px');
    if(cfg.shopBgColor) document.querySelector('.shop-page').style.background = cfg.shopBgColor;
    if(cfg.shopPagePt != null) document.documentElement.style.setProperty('--shop-page-pt', cfg.shopPagePt + 'px');
    if(cfg.shopBarPt  != null) document.documentElement.style.setProperty('--shop-bar-pt',  cfg.shopBarPt  + 'px');
    if(cfg.shopGridGap!= null) document.documentElement.style.setProperty('--shop-grid-gap', cfg.shopGridGap + 'px');
  });
  </script>

  <!-- Filter strip -->
  <div class="filter-strip" id="filterStrip">
    <div class="container">
      <div class="filter-strip-inner" id="filterChips">
        <button class="fchip active" data-cat="all">Todos</button>
        <button class="fchip" data-cat="impresion">Impresión</button>
        <button class="fchip" data-cat="packaging">Packaging</button>
        <button class="fchip" data-cat="giganto">Gigantografías</button>
        <button class="fchip" data-cat="diseno">Diseño</button>
        <button class="fchip" data-cat="merch">Merchandising</button>
        <button class="fchip" data-cat="papeleria">Papelería</button>
      </div>
    </div>
  </div>

  <!-- Products -->
  <div class="shop-page">
    <div class="container">
      <div class="shop-bar">
        <span class="shop-bar-count" id="shopCount">Cargando...</span>
        <select class="sort-select" id="sortSelect">
          <option value="popular">Más vendidos</option>
          <option value="default">Ordenar: relevancia</option>
          <option value="price-asc">Precio: menor a mayor</option>
          <option value="price-desc">Precio: mayor a menor</option>
        </select>
      </div>
      <div class="shop-grid" id="shopGrid">
        <!-- skeletons -->
        <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb" style="height:200px"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
      </div>
    </div>
  </div>

</main>

<script>
(function () {
  var allProducts = [];
  var activeCat = 'all';
  var searchQ = '';
  var grid = document.getElementById('shopGrid');
  var countEl = document.getElementById('shopCount');

  // Params
  var params = new URLSearchParams(location.search);
  if (params.get('cat')) {
    activeCat = params.get('cat');
    document.querySelectorAll('#filterChips .fchip').forEach(function(c) {
      c.classList.toggle('active', c.dataset.cat === activeCat);
    });
  }

  // Filters
  document.querySelectorAll('#filterChips .fchip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      activeCat = chip.dataset.cat;
      document.querySelectorAll('#filterChips .fchip').forEach(function(c) { c.classList.remove('active'); });
      chip.classList.add('active');
      var url = activeCat === 'all' ? '/shop' : '/shop?cat=' + activeCat;
      history.replaceState(null, '', url);
      render();
    });
  });

  // Search
  // (búsqueda disponible desde la navbar)

  // Sort
  document.getElementById('sortSelect').addEventListener('change', function() { render(); });

  function getFiltered() {
    var list = allProducts.filter(function(p) { return !p.hidden; });
    if (activeCat !== 'all') list = list.filter(function(p) { return (p.cats||[p.cat]).indexOf(activeCat) >= 0; });
    if (searchQ) {
      list = list.filter(function(p) {
        return (p.name || '').toLowerCase().includes(searchQ)
          || (p.desc || '').toLowerCase().includes(searchQ)
          || (p.category || '').toLowerCase().includes(searchQ);
      });
    }
    var sort = document.getElementById('sortSelect').value;
    if (sort === 'popular') list = list.slice().sort(function(a,b) { return (b.badge ? 1 : 0) - (a.badge ? 1 : 0); });
    if (sort === 'price-asc') list = list.slice().sort(function(a,b) { return a.price - b.price; });
    if (sort === 'price-desc') list = list.slice().sort(function(a,b) { return b.price - a.price; });
    return list;
  }

  function render() {
    var products = getFiltered();
    countEl.textContent = products.length + ' producto' + (products.length !== 1 ? 's' : '');
    if (!products.length) {
      grid.innerHTML = '<div class="shop-empty">No encontramos productos para esa búsqueda.<br>Escribinos por <a href="https://wa.me/5491136365889">WhatsApp</a> y te cotizamos.</div>';
      return;
    }
    grid.innerHTML = products.map(function(p) {
      var waMsg = encodeURIComponent('Hola! Me interesa "' + p.name + '". ¿Pueden cotizarme?');
      var detailUrl = '/shop/producto?id=' + encodeURIComponent(p.id || p.name);
      var imgs = (p.images && p.images.length) ? p.images : (p.img ? [p.img] : []);
      var thumbInner = imgs.length
        ? '<a class="tg-link" href="' + detailUrl + '"><img class="tg-img" src="' + imgs[0] + '" alt="' + p.name + '" loading="lazy"></a>'
          + (imgs.length > 1 ? '<button class="tg-arrow prev" type="button" aria-label="Anterior">‹</button><button class="tg-arrow next" type="button" aria-label="Siguiente">›</button>' : '')
        : '<a class="tg-link" href="' + detailUrl + '" style="display:flex;align-items:center;justify-content:center"><div class="pcard-thumb-placeholder">' + (p.name || 'MI').slice(0, 2).toUpperCase() + '</div></a>';
      return '<div class="pcard ' + (p.color || 'm') + '-card">'
        + '<div class="pcard-thumb tg" data-imgs=\'' + JSON.stringify(imgs).replace(/'/g,"&#39;") + '\' data-i="0">'
        + (p.badge ? '<span class="pcard-badge badge-' + (p.badgeType || 'hot') + '">' + p.badge + '</span>' : '')
        + thumbInner
        + '</div>'
        + '<div class="pcard-body">'
        + '<span class="pcard-cat">' + (p.category || '') + '</span>'
        + '<a class="pcard-name" href="' + detailUrl + '" style="text-decoration:none;color:inherit">' + p.name + '</a>'
        + '<p class="pcard-desc">' + (p.desc || '').slice(0, 80) + (p.desc && p.desc.length > 80 ? '…' : '') + '</p>'
        + '<div class="pcard-specs">' + (p.specs || []).slice(0, 3).map(function(s) { return '<span class="pcard-spec">' + s + '</span>'; }).join('') + '</div>'
        + '<div class="pcard-price-row"><span class="pcard-from">Desde</span><span class="pcard-price">$' + (p.price || 0).toLocaleString('es-AR') + '</span><span class="pcard-unit">' + (p.unit || '') + '</span></div>'
        + '<div class="pcard-delivery"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> ' + (p.delivery || 'Consultar') + '</div>'
        + '<div class="pcard-actions">'
        + '<button class="pcard-btn-cart" data-product=\'' + JSON.stringify({id:p.id||p.name,name:p.name,price:p.price,unit:p.unit,color:p.color||'m',icon:p.icon||'📦'}).replace(/'/g,"&#39;") + '\'><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg> Agregar</button>'
        + '<a href="' + detailUrl + '" class="pcard-btn-detail">Ver producto →</a>'
        + '</div>'
        + '</div></div>';
    }).join('');

    // Bind add to cart buttons
    grid.querySelectorAll('.pcard-btn-cart').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        try {
          var prod = JSON.parse(btn.dataset.product);
          Cart.add(prod);
        } catch(_) {}
      });
    });
  }

  // Load
  fetch('/api/products')
    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
    .catch(function() { return null; })
    .then(function(d) {
      allProducts = d && d.products ? d.products : [];
      render();
    });

  // Sticky filter strip offset (below sticky nav)
  var strip = document.getElementById('filterStrip');
  var nav = document.getElementById('nav');
  function updateSticky() {
    if (nav) strip.style.top = nav.offsetHeight + 'px';
  }
  updateSticky();
  window.addEventListener('resize', updateSticky);
})();
</script>
</body>
</html>
