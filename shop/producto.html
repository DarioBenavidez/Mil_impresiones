<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Producto · Mil Impresiones</title>
<meta name="description" content="Impresión digital de calidad en Buenos Aires. Cotización en 2 hs · Entrega en 48-72 hs · IVA incluido.">
<meta property="og:type" content="product">
<meta property="og:site_name" content="Mil Impresiones">
<meta property="og:locale" content="es_AR">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/assets/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,ital,wght@9..144,1,400&family=Jost:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,ital,wght@9..144,1,400&family=Jost:wght@400;500;600;700&display=swap"></noscript>
<link rel="stylesheet" href="/styles.css">
<script src="/chrome.js?v=8" defer></script>
<style>
.producto-page { padding: var(--s6) 0 var(--s10); }

/* Breadcrumb */
.breadcrumb {
  font-size: 13px; color: var(--fg-3);
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; margin-bottom: var(--s6);
}
.breadcrumb a { color: var(--fg-2); text-decoration: none; }
.breadcrumb a:hover { color: var(--fg); }
.breadcrumb span { color: var(--fg-3); }

/* Main layout */
.producto-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s8);
  align-items: start;
}
@media(max-width:860px) { .producto-layout { grid-template-columns: 1fr; gap: var(--s6); } }

/* Visual */
.producto-visual {
  position: relative;
}
.producto-img-wrap {
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 4/3;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.producto-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.producto-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 80px; font-weight: 700;
  opacity: .4; letter-spacing: -.04em;
  color: var(--fg-3);
}
.visual-m, .visual-c, .visual-y, .visual-k { background: var(--bg-2); }

.producto-badge-wrap { margin-top: var(--s4); display: flex; gap: var(--s2); flex-wrap: wrap; }

/* Miniaturas de galería */
.producto-thumbs { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.tg-thumb { width: 68px; height: 50px; border-radius: 8px; overflow: hidden; border: 2px solid transparent; background: var(--bg-2); cursor: pointer; padding: 0; }
.tg-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.tg-thumb.active { border-color: var(--m); }
/* En el detalle, mostrar las flechas siempre (no solo en hover) */
.producto-visual .tg-arrow { opacity: .92; }

/* Info */
.producto-info {}
.producto-cat {
  font-family: var(--font-display); font-size: 12px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase; color: var(--fg-3);
  display: block; margin-bottom: var(--s3);
}
.producto-name {
  font-family: var(--font-display);
  font-size: clamp(26px, 3.5vw, 44px);
  font-weight: 700; letter-spacing: -.035em;
  color: var(--fg); line-height: 1.05;
  margin-bottom: var(--s4);
}
.producto-desc {
  font-size: 16px; color: var(--fg-2);
  line-height: 1.6; margin-bottom: var(--s5);
  max-width: 520px;
}

/* Specs */
.producto-specs {
  display: flex; gap: var(--s2); flex-wrap: wrap;
  margin-bottom: var(--s5);
}
.producto-spec {
  font-family: var(--font-display); font-size: 12px;
  padding: 5px 12px; border-radius: 999px;
  background: var(--bg-2); color: var(--fg-2);
  border: 1px solid var(--border);
}

/* Price */
.producto-price-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--s5);
  margin-bottom: var(--s5);
}
.precio-label { font-size: 12px; color: var(--fg-3); margin-bottom: 4px; }
.precio-amount {
  font-family: var(--font-display);
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 700; letter-spacing: -.04em;
  color: var(--fg); line-height: 1;
}
.precio-unit { font-size: 14px; color: var(--fg-3); margin-left: 6px; }
.precio-delivery {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: var(--s3);
  font-family: var(--font-display); font-size: 13px;
  color: var(--c); font-weight: 600;
}

/* Quantity */
.qty-section {
  display: flex; align-items: center; gap: var(--s4);
  margin-bottom: var(--s4);
}
.qty-label { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--fg-2); }
.qty-ctrl {
  display: flex; align-items: center;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden;
}
.qty-btn-p {
  width: 40px; height: 40px;
  background: var(--bg-2); border: none;
  font-size: 20px; cursor: pointer; color: var(--fg);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.qty-btn-p:hover { background: var(--border); }
.qty-num {
  width: 48px; text-align: center;
  font-family: var(--font-display); font-size: 16px; font-weight: 600;
  background: transparent; border: none; color: var(--fg);
}

/* Action buttons */
.producto-ctas { display: flex; flex-direction: column; gap: var(--s3); }
.btn-add-cart {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-display); font-size: 16px; font-weight: 700;
  padding: 16px 24px; border-radius: var(--radius-sm);
  background: var(--m); color: #fff; border: none; cursor: pointer;
  transition: background .2s, transform .15s;
  text-decoration: none;
}
.btn-add-cart:hover { background: color-mix(in srgb, var(--m) 85%, #000); transform: translateY(-1px); }

.btn-wa-prod {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-display); font-size: 15px; font-weight: 600;
  padding: 14px 24px; border-radius: var(--radius-sm);
  background: #25D366; color: #fff;
  text-decoration: none; transition: background .2s, transform .15s;
}
.btn-wa-prod:hover { background: #20b85a; transform: translateY(-1px); }

/* Trust chips below buttons */
.trust-chips {
  display: flex; gap: var(--s3); flex-wrap: wrap;
  margin-top: var(--s4); padding-top: var(--s4);
  border-top: 1px solid var(--border);
}
.trust-chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--fg-3);
  font-family: var(--font-display);
}

/* Related */
.related-section { padding-top: var(--s8); border-top: 1px solid var(--border); margin-top: var(--s8); }
.related-title {
  font-family: var(--font-display); font-size: 22px; font-weight: 700;
  letter-spacing: -.02em; margin-bottom: var(--s5);
}
.related-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--s4);
}
@media(max-width:860px) { .related-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:480px) { .related-grid { grid-template-columns: 1fr 1fr; } }

.rcard {
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; text-decoration: none; color: inherit;
  display: flex; flex-direction: column;
  transition: transform .25s, box-shadow .25s;
  background: var(--card);
  box-shadow: 0 16px 36px -10px rgba(0,0,0,.30);
}
.rcard:hover { transform: translateY(-3px); box-shadow: 0 26px 56px -14px rgba(0,0,0,.34); }
.rcard-thumb {
  aspect-ratio: 3/2;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.rcard-thumb img { width: 100%; height: 100%; object-fit: cover; }
.rcard-thumb-ph {
  font-family: var(--font-display); font-size: 32px; font-weight: 700;
  opacity: .4; color: var(--fg-3);
}
.rcard-thumb { background: var(--bg-2); }
.rcard-body { padding: var(--s3); }
.rcard-name { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--fg); }
.rcard-price { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--fg-2); margin-top: 3px; }

/* Loading / error */
.page-loading { padding: var(--s10); text-align: center; color: var(--fg-3); font-size: 16px; }

/* Lightbox */
.img-zoom-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; z-index: 9999;
  background: rgba(0,0,0,.92);
  display: flex; align-items: center; justify-content: center;
  cursor: zoom-out;
  animation: lbFadeIn .18s ease;
}
@keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }
.img-zoom-overlay img {
  max-width: 95vw;
  max-height: 88vh;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  cursor: default;
  display: block;
  touch-action: pinch-zoom;
}
.img-zoom-close {
  position: absolute; top: 18px; right: 22px;
  color: #fff; font-size: 40px; font-weight: 300;
  cursor: pointer; line-height: 1; opacity: .85;
  z-index: 1;
}
.img-zoom-close:hover { opacity: 1; }
.producto-img-wrap img { cursor: zoom-in; }
</style>
</head>
<body data-page="producto">
<main>
  <div class="producto-page">
    <div class="container">
      <div id="pageContent">
        <div class="page-loading">Cargando producto...</div>
      </div>
    </div>
  </div>
</main>

<script>
function openImgZoom(src) {
  var ov = document.createElement('div');
  ov.className = 'img-zoom-overlay';
  ov.innerHTML = '<span class="img-zoom-close" onclick="this.parentNode.remove()">&#215;</span><img src="' + src + '" alt="">';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(e) { if (e.target === ov) ov.remove(); });
  document.addEventListener('keydown', function onKey(e) {
    if (e.key === 'Escape') { ov.remove(); document.removeEventListener('keydown', onKey); }
  });
}
</script>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var productId = params.get('id') || '';
  var qty = 1;
  var product = null;
  var allProducts = [];

  function renderNotFound() {
    document.getElementById('pageContent').innerHTML =
      '<div class="page-loading">Producto no encontrado. <a href="/shop" style="color:var(--m);font-weight:600">Volver a la tienda →</a></div>';
  }

  function getAccentClass(color) {
    if (color === 'c') return 'c-accent';
    if (color === 'k') return 'k-accent';
    return '';
  }

  function renderProduct(p) {
    var accentClass = getAccentClass(p.color || 'm');
    var visualClass = 'visual-' + (p.color || 'm');
    var imgs = (p.images && p.images.length) ? p.images : (p.img ? [p.img] : []);
    var galleryHtml;
    if (imgs.length) {
      galleryHtml = '<div class="producto-img-wrap ' + visualClass + '">'
        + '<img class="tg-img" src="' + imgs[0] + '" alt="' + p.name + '" style="cursor:zoom-in" onclick="openImgZoom(this.src)">'
        + (imgs.length > 1 ? '<button class="tg-arrow prev" type="button" aria-label="Anterior">‹</button><button class="tg-arrow next" type="button" aria-label="Siguiente">›</button>' : '')
        + '</div>'
        + (imgs.length > 1 ? '<div class="producto-thumbs">' + imgs.map(function(u, i){ return '<button class="tg-thumb' + (i === 0 ? ' active' : '') + '" type="button" data-idx="' + i + '"><img src="' + u + '" alt=""></button>'; }).join('') + '</div>' : '');
    } else {
      galleryHtml = '<div class="producto-img-wrap ' + visualClass + '"><div class="producto-img-placeholder">' + (p.name || 'MI').slice(0, 2).toUpperCase() + '</div></div>';
    }

    var waMsg = encodeURIComponent('Hola! Me interesa "' + p.name + '". ¿Pueden cotizarme?');

    document.title = p.name + ' · Mil Impresiones';
    var pageUrl = 'https://milimpresiones.com/shop/producto?id=' + encodeURIComponent(p.id || p.name);
    var desc = (p.description || ('Comprá ' + p.name + ' en Mil Impresiones. Cotización en 2 hs · Entrega en 48-72 hs · IVA incluido.'));
    var img = p.img ? ('https://milimpresiones.com' + p.img.replace(/\?.*/, '')) : 'https://milimpresiones.com/assets/uploads/banner-home.png';
    document.querySelector('meta[name="description"]').content = desc;
    (function setMeta(prop, val) {
      var el = document.querySelector('meta[property="' + prop + '"]') || document.createElement('meta');
      el.setAttribute('property', prop); el.content = val;
      if (!el.parentNode) document.head.appendChild(el);
    });
    [['og:url', pageUrl], ['og:title', p.name + ' · Mil Impresiones'], ['og:description', desc], ['og:image', img]].forEach(function(m) {
      var el = document.querySelector('meta[property="' + m[0] + '"]') || document.createElement('meta');
      el.setAttribute('property', m[0]); el.content = m[1];
      if (!el.parentNode) document.head.appendChild(el);
    });
    var ld = document.createElement('script');
    ld.type = 'application/ld+json';
    ld.text = JSON.stringify({ '@context':'https://schema.org', '@type':'Product', name: p.name, description: desc, image: img, url: pageUrl, offers: { '@type':'Offer', priceCurrency:'ARS', price: p.price || 0, availability:'https://schema.org/InStock', seller: { '@type':'Organization', name:'Mil Impresiones' } } });
    document.head.appendChild(ld);

    document.getElementById('pageContent').innerHTML = [
      '<nav class="breadcrumb">',
        '<a href="/">Inicio</a><span>›</span>',
        '<a href="/shop">Tienda</a><span>›</span>',
        '<a href="/shop?cat=' + p.cat + '">' + (p.category || p.cat) + '</a><span>›</span>',
        '<span>' + p.name + '</span>',
      '</nav>',

      '<div class="producto-layout">',

        // Visual
        '<div class="producto-visual tg" data-imgs=\'' + JSON.stringify(imgs).replace(/'/g,"&#39;") + '\' data-i="0">',
          galleryHtml,
          (p.badge ? '<div class="producto-badge-wrap"><span class="pcard-badge badge-' + (p.badgeType||'hot') + '">' + p.badge + '</span></div>' : ''),
        '</div>',

        // Info
        '<div class="producto-info">',
          '<span class="producto-cat">' + (p.category || '') + '</span>',
          '<h1 class="producto-name">' + p.name + '</h1>',
          '<p class="producto-desc">' + (p.desc || '') + '</p>',

          '<div class="producto-specs">',
            (p.specs || []).map(function(s) { return '<span class="producto-spec">' + s + '</span>'; }).join(''),
          '</div>',

          '<div class="producto-price-box">',
            '<div class="precio-label">Precio desde</div>',
            '<div>',
              '<span class="precio-amount">$' + (p.price || 0).toLocaleString('es-AR') + '</span>',
              '<span class="precio-unit">' + (p.unit || '') + '</span>',
            '</div>',
            '<div class="precio-delivery">',
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
              (p.delivery || 'Consultar'),
            '</div>',
          '</div>',

          '<div class="qty-section">',
            '<span class="qty-label">Cantidad:</span>',
            '<div class="qty-ctrl">',
              '<button class="qty-btn-p" id="qtyDec">−</button>',
              '<span class="qty-num" id="qtyNum">1</span>',
              '<button class="qty-btn-p" id="qtyInc">+</button>',
            '</div>',
          '</div>',

          '<div class="producto-ctas">',
            '<button class="btn-add-cart ' + accentClass + '" id="btnAddCart">',
              '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>',
              'Agregar al carrito',
            '</button>',
            '<a href="https://wa.me/5491136365889?text=' + waMsg + '" class="btn-wa-prod" target="_blank">',
              '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.559 4.122 1.533 5.856L0 24l6.341-1.516A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.857 0-3.599-.487-5.112-1.338l-.368-.216-3.765.9.95-3.668-.235-.384A10 10 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>',
              'Consultar por WhatsApp',
            '</a>',
          '</div>',

          '<div class="trust-chips">',
            '<span class="trust-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--c)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Compra segura</span>',
            '<span class="trust-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--m)"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Cotización en 2 hs</span>',
            '<span class="trust-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--y-ink)"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Envío a todo el país</span>',
          '</div>',
        '</div>',

      '</div>',

      // Related
      '<div class="related-section" id="relatedSection">',
        '<h2 class="related-title">Otros productos</h2>',
        '<div class="related-grid" id="relatedGrid"></div>',
      '</div>',
    ].join('');

    // Qty controls
    document.getElementById('qtyInc').addEventListener('click', function() {
      qty = Math.min(qty + 1, 99);
      document.getElementById('qtyNum').textContent = qty;
    });
    document.getElementById('qtyDec').addEventListener('click', function() {
      qty = Math.max(qty - 1, 1);
      document.getElementById('qtyNum').textContent = qty;
    });

    // Add to cart
    document.getElementById('btnAddCart').addEventListener('click', function() {
      for (var i = 0; i < qty; i++) {
        Cart.add({ id: p.id || p.name, name: p.name, price: p.price, unit: p.unit, color: p.color || 'm', icon: p.icon || '📦' });
      }
    });

    // Related products
    var related = allProducts.filter(function(r) { return r.id !== p.id && !r.hidden; }).slice(0, 4);
    var rGrid = document.getElementById('relatedGrid');
    if (rGrid) {
      rGrid.innerHTML = related.map(function(r) {
        var rThumb = r.img
          ? '<img src="' + r.img + '" alt="' + r.name + '" loading="lazy">'
          : '<div class="rcard-thumb-ph">' + (r.name || 'MI').slice(0, 2).toUpperCase() + '</div>';
        return '<a href="/shop/producto?id=' + encodeURIComponent(r.id) + '" class="rcard ' + (r.color||'m') + '-card">'
          + '<div class="rcard-thumb">' + rThumb + '</div>'
          + '<div class="rcard-body">'
          + '<div class="rcard-name">' + r.name + '</div>'
          + '<div class="rcard-price">Desde $' + (r.price||0).toLocaleString('es-AR') + '</div>'
          + '</div></a>';
      }).join('');
    }
  }

  fetch('/api/products')
    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
    .catch(function() { return null; })
    .then(function(d) {
      if (!d || !d.products) { renderNotFound(); return; }
      allProducts = d.products;
      product = allProducts.find(function(p) { return p.id === productId; });
      if (!product) { renderNotFound(); return; }
      renderProduct(product);
    });
})();
</script>
</body>
</html>
