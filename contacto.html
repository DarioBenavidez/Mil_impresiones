              </div>
              <div>
                <div class="channel-label">WhatsApp</div>
                <div class="channel-value">Chat directo</div>
              </div>
            </a>
            <a href="mailto:ventas@milimpresiones.com" class="channel">
              <div class="channel-icon mail">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg>
              </div>
              <div>
                <div class="channel-label">Email</div>
                <div class="channel-value">ventas@milimpresiones.com</div>
              </div>
            </a>
            <a href="https://www.instagram.com/1000_impresiones" target="_blank" class="channel">
              <div class="channel-icon" style="background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
              </div>
              <div>
                <div class="channel-label">Instagram</div>
                <div class="channel-value">@1000_impresiones</div>
              </div>
            </a>
          </div>
        </div>

        <div class="form-card reveal reveal-delay-1">
          <h3 style="margin-bottom: var(--s5); font-size: 24px;">Contanos tu proyecto</h3>
          <form id="contactForm">
            <input type="hidden" name="access_key" value="d1b10572-b5fd-4b85-b9ae-bcde20db4662">
            <input type="hidden" name="subject" value="Nueva consulta - Mil Impresiones">
            <input type="hidden" name="from_name" value="Formulario milimpresiones.com">
            <div class="form-group">
              <label>¿Cómo te llamás?</label>
              <input type="text" name="nombre" class="form-input" placeholder="Tu nombre" required>
            </div>
            <div class="form-group">
              <label>¿Qué estás buscando?</label>
              <select name="servicio" class="form-select" id="serviceSelect" required>
                <option value="">Elegí un servicio</option>
                <option value="Impresión digital">Impresión digital</option>
                <option value="Diseño gráfico">Diseño gráfico</option>
                <option value="Packaging & etiquetas">Packaging & etiquetas</option>
                <option value="Gigantografías & viniles">Gigantografías & viniles</option>
                <option value="Merchandising / Souvenir">Merchandising / Souvenir</option>
                <option value="Offset & tiradas grandes">Offset & tiradas grandes</option>
                <option value="Papelería creativa">Papelería creativa</option>
                <option value="Otro / no estoy seguro">Otro / no estoy seguro</option>
              </select>
            </div>
            <div class="form-group">
              <label>Contanos tu idea</label>
              <textarea name="mensaje" class="form-textarea" placeholder="Cantidad, medidas, fechas o lo que tengas en mente" required></textarea>
            </div>

            <!-- Toggle WhatsApp / Email -->
            <div class="form-group">
              <label>¿Cómo preferís que te contactemos?</label>
              <div class="contact-toggle">
                <button type="button" class="toggle-btn active" data-channel="whatsapp">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.488"/></svg>
                  WhatsApp
                </button>
                <button type="button" class="toggle-btn" data-channel="email">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg>
                  Email
                </button>
              </div>
              <input type="hidden" name="canal_preferido" id="canalPreferido" value="WhatsApp">
              <input type="tel" name="whatsapp" id="inputWhatsapp" class="form-input" placeholder="Ej: 11 1234-5678" style="margin-top: var(--s3);" required>
              <input type="email" name="email" id="inputEmail" class="form-input" placeholder="tu@email.com" style="margin-top: var(--s3); display:none;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 16px;">
              Enviar consulta
              <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            </button>
            <p class="form-hint" style="text-align: center;">Te respondemos dentro de las 24 hs hábiles.</p>
          </form>
        </div>
      </div>
    </div>
  </section>
</main>

<style>
  .contact-toggle {
    display: flex;
    gap: var(--s2);
    margin-bottom: 0;
  }
  .toggle-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--s2);
    padding: 12px var(--s4);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--card);
    color: var(--fg-2);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s ease;
    font-family: var(--font-body);
  }
  .toggle-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .toggle-btn.active {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }
</style>

<script src="chrome.js?v=2"></script>
<script>
  // Preselect service from query string (e.g. ?s=packaging)
  const params = new URLSearchParams(location.search);
  const s = params.get('s');
  if (s) {
    const sel = document.getElementById('serviceSelect');
    if (sel && [...sel.options].some(o => o.value === s)) sel.value = s;
  }

  // Toggle WhatsApp / Email
  const toggleBtns   = document.querySelectorAll('.toggle-btn');
  const inputWA      = document.getElementById('inputWhatsapp');
  const inputEmail   = document.getElementById('inputEmail');
  const canalHidden  = document.getElementById('canalPreferido');

  toggleBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      toggleBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const ch = btn.dataset.channel;
      if (ch === 'whatsapp') {
        inputWA.style.display    = '';
        inputEmail.style.display = 'none';
        inputWA.required         = true;
        inputEmail.required      = false;
        canalHidden.value        = 'WhatsApp';
      } else {
        inputWA.style.display    = 'none';
        inputEmail.style.display = '';
        inputWA.required         = false;
        inputEmail.required      = true;
        canalHidden.value        = 'Email';
      }
    });
  });

  // Submit via Web3Forms
  document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type=submit]');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = 'Enviando...';
    btn.disabled = true;

    const data = Object.fromEntries(new FormData(this));

    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      if (json.success) {
        btn.innerHTML = '✓ Consulta enviada · Te respondemos en 24 hs';
        btn.style.background = '#22c55e';
        setTimeout(() => { this.reset(); btn.innerHTML = originalHTML; btn.style.background = ''; btn.disabled = false; }, 4000);
      } else {
        throw new Error(json.message);
      }
    } catch(err) {
      btn.innerHTML = 'Error al enviar · Intentá de nuevo';
      btn.style.background = '#ef4444';
      setTimeout(() => { btn.innerHTML = originalHTML; btn.style.background = ''; btn.disabled = false; }, 3000);
    }
  });
</script>
</body>
</html>
